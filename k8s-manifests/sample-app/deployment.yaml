apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          # Pinned to the digest signed by the CI pipeline (Phase 3).
          image: ghcr.io/edosag/devsecops-portfolio-project@sha256:fb2f9edb9a228a40ba4fab64cd43b1e2ad7a45cc5109561ecc78e887a419e221
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
