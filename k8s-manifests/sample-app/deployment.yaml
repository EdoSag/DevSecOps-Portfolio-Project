apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          # Pinned to the digest signed by the CI pipeline (Phase 3).
          image: ghcr.io/edosag/devsecops-portfolio-project@sha256:b5a19521f3ed5ce1cd1830f3a54651eadf0dfae9947cc845f442c04ad772ca42
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
