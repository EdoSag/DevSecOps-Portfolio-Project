apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          # Pinned to the digest signed by the CI pipeline (Phase 3).
          image: ghcr.io/edosag/devsecops-portfolio-project@sha256:e225fb9c359581d45706ad4364d7b96f1e70c87615c7a81a26ac39c3712fc939
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
