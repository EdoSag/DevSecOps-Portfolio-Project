apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          # Pinned to the digest signed by the CI pipeline (Phase 3).
          image: ghcr.io/edosag/devsecops-portfolio-project@sha256:0f63fed037b9a2f615d0b8353d6f2bd24f9c2b008f73f0a9afbfa0eb6dff540d
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
