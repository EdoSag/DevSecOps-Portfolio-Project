# App-of-apps root Application. Applied manually once; ArgoCD then manages
# every Application manifest under k8s-manifests/argocd/apps/ itself.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EdoSag/DevSecOps-Portfolio-Project.git
    targetRevision: main
    path: k8s-manifests/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
