driver:
  kind: modern_ebpf

# Falco DaemonSet resource limits for t3.small nodes
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

falcosidekick:
  enabled: true

  # All Falcosidekick config env vars (including credentials) come from a
  # pre-created Secret that is NOT managed by this Helm chart.
  # Create it manually:
  #   kubectl -n falco create secret generic falco-sidekick-config \
  #     --from-literal=SLACK_WEBHOOKURL=https://hooks.slack.com/... \
  #     --from-literal=SLACK_MINIMUMPRIORITY=warning \
  #     --from-literal=GCP_CREDENTIALS=<base64-SA-key-JSON> \
  #     --from-literal=GCP_STORAGE_BUCKET=devsecops-portfolio-security-logs \
  #     --from-literal=GCP_STORAGE_PREFIX=falco-alerts \
  #     --from-literal=GCP_STORAGE_MINIMUMPRIORITY=warning
  replicaCount: 1

  config:
    # All Falcosidekick config env vars (including credentials) come from a
    # pre-created Secret. It is appended to envFrom AFTER the chart-created
    # secret, so its values override the empty defaults for SLACK_WEBHOOKURL,
    # GCP_CREDENTIALS, etc.
    existingSecret: falco-sidekick-config

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
