driver:
  kind: modern_ebpf

# Falco DaemonSet resource limits for t3.small nodes
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

falcosidekick:
  enabled: true

  # Non-secret config baked into the ConfigMap; secrets are injected via
  # extraEnv below (env vars override ConfigMap values at runtime).
  config:
    gcp:
      credentials: ""
      storage:
        bucket: devsecops-portfolio-security-logs
        prefix: falco-alerts
        minimumpriority: warning
    slack:
      webhookurl: ""
      minimumpriority: warning
      messageformat: |
        *[Falco]* `{{ .Rule }}` on `{{ .OutputFields.k8s.pod.name }}` — *{{ .Priority }}*
        > {{ .Output }}

  # Secrets are injected here; env var names map to falcosidekick config keys.
  extraEnv:
    - name: SLACK_WEBHOOKURL
      valueFrom:
        secretKeyRef:
          name: falco-slack-secret
          key: webhookurl
    - name: GCP_CREDENTIALS
      valueFrom:
        secretKeyRef:
          name: falco-gcs-b64-secret
          key: credentials

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
