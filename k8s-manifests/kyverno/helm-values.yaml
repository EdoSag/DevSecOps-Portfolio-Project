# Minimal-footprint values for the t3.small / 2-node demo cluster.
admissionController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  container:
    extraArgs:
      - -v=6

backgroundController:
  replicas: 1

cleanupController:
  replicas: 1

reportsController:
  replicas: 1
