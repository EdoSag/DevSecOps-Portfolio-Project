name: CI - Build, Scan, Sign

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci-build-scan-sign.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/ci-build-scan-sign.yml'

permissions:
  contents: read

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan (fail on ERROR severity findings)
        run: semgrep scan --config p/javascript --config p/security-audit --error app/

  sca-deps:
    name: SCA - dependencies (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: app
          severity: CRITICAL,HIGH
          exit-code: '1'

  build-and-push:
    name: Build & push image
    needs: [sast, sca-deps]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: app
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

  sca-image:
    name: SCA - image (Trivy)
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: image
          image-ref: ${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}
          severity: CRITICAL
          exit-code: '1'

  sign:
    name: Sign image (Cosign)
    needs: [build-and-push, sca-image]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - uses: sigstore/cosign-installer@v4.1.2

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (keyless)
        run: cosign sign --yes ${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}
